<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@3.0.2/Control.FullScreen.css"/>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@3.0.2/Control.FullScreen.js"></script>
    <title>Map</title>
</head>

<body>

    <!-- ROUTE SELECTION SCREEN -->
    <div id="routeScreen">
        <h1>Select Route</h1>
        <button onclick="selectRoute('1T.geojson', 'Linia 1 T')">Linia 1  BIG - Leoni 15:10</button>
        <button onclick="selectRoute('1R.geojson', 'Linia 1 R')">Linia 1  Leoni - BIG 15:40</button>
        <button onclick="selectRoute('1BT.geojson', 'Linia 1B T')">Linia 1B  BIG - Cuza Voda 18:45</button>
        <button onclick="selectRoute('1BR.geojson', 'Linia 1B R')">Linia 1B  Cuza Voda - BIG 20:00</button>
        <button onclick="selectRoute('1T.geojson', 'Linia 1C T')">Linia 1C  BIG - Leoni 15:10</button>
        <button onclick="selectRoute('1CR.geojson', 'Linia 1C R')">Linia 1C  Leoni - BIG 15:40</button>
        <button onclick="selectRoute('3T.geojson', 'Linia 3 T')">Linia 3 BIG - Generala 6 18:45</button>
        <button onclick="selectRoute('3R.geojson', 'Linia 3 R')">Linia 3 Generala 6 - BIG 20:00</button>
        <button onclick="selectRoute('8T.geojson', 'Linia 8 T')">Linia 8 BIG - Simpozionului 16:00</button>
        <button onclick="selectRoute('8R.geojson', 'Linia 8 R')">Linia 8 Simpozionului - BIG 16:20</button>
        <button onclick="selectRoute('beclean.geojson', '20 BISTRITA - SIEU MAGHERUS - BECLEAN')">Linia 20 Bistrita - Beclean 11:50</button>
        <button onclick="selectRoute('test.geojson', 'GARAJ')">GARAJ</button>
        <button onclick="selectRoute('test2.geojson', 'GARAJ2')">GARAJ 2- teste GPS pentru Motorola</button>
    </div>

    <!-- MAP SCREEN -->
    <div id="mapScreen" style="display:none;">
        <div id="map">
            <div id="infoPanel">
                <div id="infoPanelContent">Waiting for GPS...</div>
            </div>
        </div>
    </div>

</body>

<script>
    // --- Map setup ---
    var map = L.map('map', { fullscreenControl: true, fullscreenControlOptions: { position: 'topleft' } }).setView([47.132, 24.491], 14);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    var markerIcon = L.icon({
        iconUrl: 'markerIcon.png',
        iconSize: [15, 15],
        iconAnchor: [10, 5],
        popupAnchor: [-2, -5],
    });

    var markerBus = L.icon({
        iconUrl: 'markerBus.png',
        iconSize: [75, 65],
        iconAnchor: [35, 32],
        popupAnchor: [0, -32],
    });

    // --- Route state ---
    let userMarker = null;
    let watchId = null;
    let timerInterval = null;
    let routeStops = [];
    let currentStopIndex = 0;
    let routeLayer = null;
    let currentRouteName = '';

    // --- Route selection ---
    function selectRoute(geojsonFile, routeName) {
        currentRouteName = routeName;
        document.getElementById('routeScreen').style.display = 'none';
        document.getElementById('mapScreen').style.display = 'block';
        map.invalidateSize();

        fetch(geojsonFile)
            .then(res => res.json())
            .then(data => {
                routeLayer = L.geoJSON(data, {
                    style: { color: 'black', weight: 5, opacity: 1 },
                    pointToLayer: (feature, latlng) => {
                        return L.marker(latlng, { icon: markerIcon });
                    },
                    onEachFeature: (feature, layer) => {
                        if (feature.geometry.type === 'Point') {
                            layer.bindPopup(`<b>${feature.properties.name}</b><br>${feature.properties.scheduledTime}`);
                        }
                    }
                }).addTo(map);

                routeStops = data.features
                    .filter(f => f.geometry.type === 'Point')
                    .sort((a, b) => a.id - b.id);

                currentStopIndex = 0;
                startTracking();
            });
    }

    // --- Geolocation ---
    function startTracking() {
        if (!navigator.geolocation) return;

        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const latlng = [position.coords.latitude, position.coords.longitude];

                if (!userMarker) {
                    userMarker = L.marker(latlng, { icon: markerBus }).addTo(map).bindPopup("").openPopup();
                    map.setView(latlng, 15);
                } else {
                    userMarker.setLatLng(latlng);
                }

                checkStop(latlng);
                updatePopup();
                updatePanel();
            },
            (error) => console.error("Geolocation error:", error.message),
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );

        timerInterval = setInterval(() => {
            updatePopup();
            updatePanel();
        }, 5000);
    }

    function stopTracking() {
        if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        if (timerInterval !== null) { clearInterval(timerInterval); timerInterval = null; }
        if (userMarker !== null) { map.removeLayer(userMarker); userMarker = null; }
        if (routeLayer !== null) { map.removeLayer(routeLayer); routeLayer = null; }
    }

    // --- Stop detection ---
    function checkStop(latlng) {
        if (currentStopIndex >= routeStops.length) return;

        const stop = routeStops[currentStopIndex];
        const stopLatLng = L.latLng(stop.geometry.coordinates[1], stop.geometry.coordinates[0]);
        const distance = L.latLng(latlng).distanceTo(stopLatLng);

        if (distance <= 30) {
            currentStopIndex++;

            if (currentStopIndex >= routeStops.length) {
                endRoute();
            }
        }
    }

    // --- Shared time status calculation ---
    function getTimeStatus(scheduledTime) {
        const now = new Date();
        const [h, m] = scheduledTime.split(':').map(Number);
        const scheduled = new Date();
        scheduled.setHours(h, m, 0, 0);

        const diffMins = Math.round((now - scheduled) / 60000);

        if (Math.abs(diffMins) <= 1) return { text: 'On time', color: 'white' };
        if (diffMins > 0) return { text: `+${diffMins} mins`, color: '#ff6b6b' };
        return { text: `${diffMins} mins`, color: '#6bff8e' };
    }

    // --- Popup: next stop + on time status ---
    function updatePopup() {
        if (!userMarker || currentStopIndex >= routeStops.length) return;

        const nextStop = routeStops[currentStopIndex];
        const scheduledTime = nextStop.properties.scheduledTime;
        const stopName = nextStop.properties.name;
        const status = getTimeStatus(scheduledTime);

        userMarker.getPopup().setContent(`
            <b>Next stop:</b> ${stopName}<br>
            <b>Scheduled:</b> ${scheduledTime}<br>
            <b>Status:</b> ${status.text}
        `).update();
    }

    // --- Info panel ---
    function updatePanel() {
        if (currentStopIndex >= routeStops.length) return;

        const nextStop = routeStops[currentStopIndex];
        const scheduledTime = nextStop.properties.scheduledTime;
        const stopName = nextStop.properties.name;
        const status = getTimeStatus(scheduledTime);

        document.getElementById('infoPanelContent').innerHTML = `
            <b>${currentRouteName}</b> &nbsp;|&nbsp;
            Next: <b>${stopName}</b> at <b>${scheduledTime}</b> &nbsp;|&nbsp;
            <span style="color:${status.color}">${status.text}</span>
        `;
    }

    // --- End of route ---
    function endRoute() {
        stopTracking();
        routeStops = [];
        currentStopIndex = 0;
        document.getElementById('infoPanelContent').innerHTML = 'Waiting for GPS...';

        document.getElementById('mapScreen').style.display = 'none';
        document.getElementById('routeScreen').style.display = 'block';
    }

    window.addEventListener("beforeunload", stopTracking);
</script>

</html>
