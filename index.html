<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@3.0.2/Control.FullScreen.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@3.0.2/Control.FullScreen.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Map</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVvYAjwplQaH82ehNXpfK25W3ORikigvE",
            authDomain: "bike-trackerv7.firebaseapp.com",
            databaseURL: "https://bike-trackerv7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bike-trackerv7",
            storageBucket: "bike-trackerv7.firebasestorage.app",
            messagingSenderId: "829142915200",
            appId: "1:829142915200:web:cd37f3234ecb850421ae65"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const busRef = ref(db, 'bus');

        const markerBus = L.icon({
            iconUrl: 'markerBus.png',
            iconSize: [75, 65],
            iconAnchor: [35, 32],
            popupAnchor: [0, -32],
        });

        let busMarker = null;

        // Listen for bus location updates in real time
        onValue(busRef, (snapshot) => {
            const data = snapshot.val();

            if (!data || !data.active) {
                // Bus not running — remove marker and hide panel
                if (busMarker) { map.removeLayer(busMarker); busMarker = null; }
                document.getElementById('infoPanelContent').innerHTML = 'Nicio cursa activa';
                return;
            }

            const latlng = [data.lat, data.lng];

            if (!busMarker) {
                busMarker = L.marker(latlng, { icon: markerBus }).addTo(map).bindPopup("").openPopup();
            } else {
                busMarker.setLatLng(latlng);
            }

            // Update popup
            busMarker.getPopup().setContent(`
                <b>Urmatoarea statie:</b> ${data.nextStop}<br>
                <b>Programat:</b> ${data.scheduledTime}<br>
                <b>Status:</b> ${data.status}
            `).update();

            // Update info panel
            const statusColor = data.status.includes('+') ? '#ff6b6b' : data.status.includes('-') ? '#6bff8e' : 'white';
            document.getElementById('infoPanelContent').innerHTML = `
                <b>${data.route}</b> &nbsp;|&nbsp;
                Urmatoarea: <b>${data.nextStop}</b> la <b>${data.scheduledTime}</b> &nbsp;|&nbsp;
                <span style="color:${statusColor}">${data.status}</span>
            `;
        });
    </script>
</head>

<body>

    <!-- MAP (always visible) -->
    <div id="mapScreen">
        <div id="map">
            <div id="infoPanel">
                <div id="infoPanelContent">Nicio cursa activa</div>
            </div>
        </div>
    </div>

    <!-- HAMBURGER BUTTON -->
    <button id="menuBtn" onclick="toggleMenu()">☰</button>

    <!-- SIDE MENU -->
    <div id="sideMenu">
        <div class="menuHeader">Selecteaza Linia</div>
        <button onclick="selectRoute('1T.geojson', 'Linia 1 T')">1 BIG - Leoni 15:10</button>
        <button onclick="selectRoute('1R.geojson', 'Linia 1 R')">1 Leoni - BIG 15:40</button>
        <button onclick="selectRoute('1BT.geojson', 'Linia 1B T')">1B BIG - Cuza Voda 18:45</button>
        <button onclick="selectRoute('1BR.geojson', 'Linia 1B R')">1B Cuza Voda - BIG 20:00</button>
        <button onclick="selectRoute('1T.geojson', 'Linia 1C T')">1C BIG - Leoni 15:10</button>
        <button onclick="selectRoute('1CR.geojson', 'Linia 1C R')">1C Leoni - BIG 15:40</button>
        <button onclick="selectRoute('3T.geojson', 'Linia 3 T')">3 BIG - Generala 6 18:45</button>
        <button onclick="selectRoute('3R.geojson', 'Linia 3 R')">3 Generala 6 - BIG 20:00</button>
        <button onclick="selectRoute('8T.geojson', 'Linia 8 T')">8 BIG - Simpozionului 16:00</button>
        <button onclick="selectRoute('8R.geojson', 'Linia 8 R')">8 Simpozionului - BIG 16:20</button>
    </div>

    <!-- OVERLAY to close menu when clicking outside -->
    <div id="menuOverlay" onclick="toggleMenu()"></div>

</body>

<script>
    // --- Map setup ---
    var map = L.map('map', { fullscreenControl: true, fullscreenControlOptions: { position: 'topleft' } }).setView([47.132, 24.491], 14);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    var markerIcon = L.icon({
        iconUrl: 'markerIcon.png',
        iconSize: [15, 15],
        iconAnchor: [10, 5],
        popupAnchor: [-2, -5],
    });

    let routeLayer = null;

    // --- Route selection (passengers just view the route, no GPS) ---
    function selectRoute(geojsonFile, routeName) {
        toggleMenu(); // close menu
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }

        fetch(geojsonFile)
            .then(res => res.json())
            .then(data => {
                routeLayer = L.geoJSON(data, {
                    style: { color: 'black', weight: 5, opacity: 1 },
                    pointToLayer: (feature, latlng) => L.marker(latlng, { icon: markerIcon }),
                    onEachFeature: (feature, layer) => {
                        if (feature.geometry.type === 'Point') {
                            layer.bindPopup(`<b>${feature.properties.name}</b><br>${feature.properties.scheduledTime}`);
                        }
                    }
                }).addTo(map);
            });
    }

    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        const isOpen = menu.classList.contains('open');
        menu.classList.toggle('open');
        overlay.classList.toggle('open');
    }
</script>

</html>
