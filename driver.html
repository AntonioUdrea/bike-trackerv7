<!DOCTYPE html>
<html>

<head>
    <title>Driver</title>
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVvYAjwplQaH82ehNXpfK25W3ORikigvE",
            authDomain: "bike-trackerv7.firebaseapp.com",
            databaseURL: "https://bike-trackerv7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bike-trackerv7",
            storageBucket: "bike-trackerv7.firebasestorage.app",
            messagingSenderId: "829142915200",
            appId: "1:829142915200:web:cd37f3234ecb850421ae65"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const busRef = ref(db, 'bus');
        onDisconnect(busRef).set({ active: false });

        const ROUTES = [
            {
                id: '1',
                name: 'Linia 1',
                departures: [
                    { file: '1T.geojson', label: 'BIG - LEONI', time: '15:10', nextFile: '1R.geojson', nextLabel: 'Leoni → BIG', nextTime: '15:40' },
                    { file: '1R.geojson', label: 'LEONI - BIG', time: '15:40', nextFile: null, nextLabel: null, nextTime: null },
                ]
            },
            {
                id: '1B',
                name: 'Linia 1B',
                departures: [
                    { file: '1BT.geojson', label: 'BIG - CUZA VODA', time: '16:45', nextFile: '1BR.geojson', nextLabel: 'CUZA VODA - BIG', nextTime: '18:00' },
                    { file: '1BR.geojson', label: 'CUZA VODA - BIG', time: '18:00', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '1BT.geojson', label: 'BIG - CUZA VODA', time: '17:45', nextFile: '1BR.geojson', nextLabel: 'CUZA VODA - BIG', nextTime: '19:00' },
                    { file: '1BR.geojson', label: 'CUZA VODA - BIG', time: '19:00', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '1BT.geojson', label: 'BIG - CUZA VODA', time: '18:45', nextFile: '1BR.geojson', nextLabel: 'CUZA VODA - BIG', nextTime: '20:00' },
                    { file: '1BR.geojson', label: 'CUZA VODA - BIG', time: '20:00', nextFile: null, nextLabel: null, nextTime: null },
                ]
            },
            {
                id: '1C',
                name: 'Linia 1C',
                departures: [
                    { file: '1T.geojson', label: 'BIG - LEONI', time: '15:10', nextFile: '1CR.geojson', nextLabel: 'LEONI - BIG', nextTime: '15:40' },
                    { file: '1CR.geojson', label: 'LEONI - BIG', time: '15:40', nextFile: null, nextLabel: null, nextTime: null },
                ]
            },
            {
                id: '3',
                name: 'Linia 3',
                departures: [
                    { file: '3T.geojson', label: 'BIG - INFOEL', time: '07:30', nextFile: '3R.geojson', nextLabel: 'INFOEL - BIG', nextTime: '14:00' },
                    { file: '3T.geojson', label: 'BIG - INFOEL', time: '19:20', nextFile: '3BR.geojson', nextLabel: 'INFOEL - BIG', nextTime: '19:40' },
                    { file: '3R.geojson', label: 'INFOEL - BIG', time: '12:30', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '3R.geojson', label: 'INFOEL - BIG', time: '13:00', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '3R.geojson', label: 'INFOEL - BIG', time: '13:30', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '3R.geojson', label: 'INFOEL - BIG', time: '14:00', nextFile: null, nextLabel: null, nextTime: null },
                ]
            },
            {
                id: '8',
                name: 'Linia 8',
                departures: [
                    { file: '8T.geojson', label: 'BIG - SIMPOZIONULUI', time: '14:00', nextFile: '8R.geojson', nextLabel: 'SIMPOZIONULUI - BIG', nextTime: '14:20' },
                    { file: '8R.geojson', label: 'SIMPOZIONULUI - BIG', time: '14:20', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '8T.geojson', label: 'BIG - SIMPOZIONULUI', time: '15:00', nextFile: '8R.geojson', nextLabel: 'SIMPOZIONULUI - BIG', nextTime: '15:20' },
                    { file: '8R.geojson', label: 'SIMPOZIONULUI - BIG', time: '15:20', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '8T.geojson', label: 'BIG - SIMPOZIONULUI', time: '16:00', nextFile: '8R.geojson', nextLabel: 'SIMPOZIONULUI - BIG', nextTime: '16:20' },
                    { file: '8R.geojson', label: 'SIMPOZIONULUI - BIG', time: '16:20', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '8T.geojson', label: 'BIG - SIMPOZIONULUI', time: '17:00', nextFile: '8R.geojson', nextLabel: 'SIMPOZIONULUI - BIG', nextTime: '17:20' },
                    { file: '8R.geojson', label: 'SIMPOZIONULUI - BIG', time: '17:20', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '8T.geojson', label: 'BIG - SIMPOZIONULUI', time: '18:00', nextFile: '8R.geojson', nextLabel: 'SIMPOZIONULUI - BIG', nextTime: '18:20' },
                    { file: '8R.geojson', label: 'SIMPOZIONULUI - BIG', time: '18:20', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '8T.geojson', label: 'BIG - SIMPOZIONULUI', time: '19:00', nextFile: '8R.geojson', nextLabel: 'SIMPOZIONULUI - BIG', nextTime: '19:20' },
                    { file: '8R.geojson', label: 'SIMPOZIONULUI - BIG', time: '19:20', nextFile: null, nextLabel: null, nextTime: null },
                    { file: '8T.geojson', label: 'BIG - SIMPOZIONULUI', time: '20:00', nextFile: '8R.geojson', nextLabel: 'SIMPOZIONULUI - BIG', nextTime: '20:20' },
                    { file: '8R.geojson', label: 'SIMPOZIONULUI - BIG', time: '20:20', nextFile: null, nextLabel: null, nextTime: null },
                ]
            },
        ];

        // -------------------------------------------------------
        // STATE
        // -------------------------------------------------------
        let watchId = null;
        let timerInterval = null;
        let routeStops = [];
        let currentStopIndex = 0;
        let currentRouteName = '';
        let currentRouteId = '';
        let departureTime = '00:00';
        let nextRouteFile = null;
        let nextRouteName = null;
        let nextRouteId = null;
        let nextDepartureTime = null;
        let wakeLock = null;

        // Trip recording
        let tripTrack = [];
        let totalDistance = 0;
        let tripStartTime = null;
        let tripDate = null;

        // -------------------------------------------------------
        // HEADER CLOCK
        // -------------------------------------------------------
        function updateHeader() {
            const now = new Date();
            const months = ['ian.', 'feb.', 'mar.', 'apr.', 'mai', 'iun.', 'iul.', 'aug.', 'sep.', 'oct.', 'nov.', 'dec.'];
            const day = now.getDate();
            const month = months[now.getMonth()];
            const hours = now.getHours().toString().padStart(2, '0');
            const mins = now.getMinutes().toString().padStart(2, '0');
            const text = `${day} ${month}, ${hours}:${mins}`;
            const el1 = document.getElementById('headerDate');
            const el2 = document.getElementById('headerDate2');
            if (el1) el1.textContent = text;
            if (el2) el2.textContent = text;
        }
        updateHeader();
        setInterval(updateHeader, 1000);

        // -------------------------------------------------------
        // SCREEN 1: route list
        // -------------------------------------------------------
        window.showRouteList = function () {
            const list = document.getElementById('routeList');
            list.innerHTML = '';
            ROUTES.forEach(route => {
                const btn = document.createElement('button');
                btn.textContent = route.name;
                btn.onclick = () => showDepartures(route.id);
                list.appendChild(btn);
            });
            document.getElementById('screen1').style.display = 'flex';
            document.getElementById('screen2').style.display = 'none';
            document.getElementById('driverScreen').style.display = 'none';
        }

        // -------------------------------------------------------
        // SCREEN 2: departures
        // -------------------------------------------------------
        window.showDepartures = function (routeId) {
            const route = ROUTES.find(r => r.id === routeId);
            if (!route) return;

            const list = document.getElementById('departureList');
            list.innerHTML = '';
            document.getElementById('screen2Title').textContent = route.name;

            const sorted = [...route.departures].sort((a, b) => {
                const [ah, am] = a.time.split(':').map(Number);
                const [bh, bm] = b.time.split(':').map(Number);
                return (ah * 60 + am) - (bh * 60 + bm);
            });

            sorted.forEach(dep => {
                const btn = document.createElement('button');
                btn.innerHTML = `<span class="depTime">${dep.time}</span><span class="depLabel">${dep.label}</span>`;
                btn.onclick = () => selectRoute(dep, routeId);
                list.appendChild(btn);
            });

            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').style.display = 'flex';
        }

        // -------------------------------------------------------
        // SELECT ROUTE & START
        // -------------------------------------------------------
        window.selectRoute = function (dep, routeId) {
            currentRouteName = `${dep.label} ${dep.time}`;
            currentRouteId = routeId;
            departureTime = dep.time;
            nextRouteFile = dep.nextFile;
            nextRouteName = dep.nextLabel ? `${dep.nextLabel} ${dep.nextTime}` : null;
            nextRouteId = dep.nextFile ? ROUTES.find(r => r.departures.some(d => d.file === dep.nextFile))?.id || routeId : null;
            nextDepartureTime = dep.nextTime;

            // Reset trip recording
            tripTrack = [];
            totalDistance = 0;
            tripStartTime = null;
            tripDate = new Date().toISOString().slice(0, 10);

            document.getElementById('screen2').style.display = 'none';
            document.getElementById('driverScreen').style.display = 'flex';
            document.querySelector('.leftPanel').style.display = 'flex';

            fetch(dep.file)
                .then(res => res.json())
                .then(data => {
                    routeStops = data.features
                        .filter(f => f.geometry.type === 'Point')
                        .sort((a, b) => a.id - b.id);
                    currentStopIndex = 0;
                    renderStops();
                    startTracking();
                });
        }

        // -------------------------------------------------------
        // SCHEDULED TIME via travelMinutes
        // -------------------------------------------------------
        function getStopScheduledTime(stop) {
            const [h, m] = departureTime.split(':').map(Number);
            const base = h * 60 + m;
            const travel = stop.properties.travelMinutes || 0;
            const total = base + travel;
            const sh = Math.floor(total / 60) % 24;
            const sm = total % 60;
            return `${sh.toString().padStart(2, '0')}:${sm.toString().padStart(2, '0')}`;
        }

        // -------------------------------------------------------
        // RENDER STOPS
        // -------------------------------------------------------
        function renderStops() {
            const list = document.getElementById('stopList');
            list.innerHTML = '';

            const visible = routeStops.slice(currentStopIndex, currentStopIndex + 4);

            visible.forEach((stop, i) => {
                const scheduledTime = getStopScheduledTime(stop);
                const stopName = stop.properties.name;

                const row = document.createElement('div');
                row.className = 'stopRow' + (i === 0 ? ' nextStop' : '');
                row.innerHTML = `
                    <span class="stopIndex">${currentStopIndex + i + 1}.</span>
                    <span class="stopName">${stopName}</span>
                    <span class="stopTime">${scheduledTime}</span>
                `;
                list.appendChild(row);
            });

            document.getElementById('routeNumber').textContent = currentRouteId;

            if (currentStopIndex < routeStops.length) {
                const status = getTimeStatus(getStopScheduledTime(routeStops[currentStopIndex]));
                document.getElementById('latenessDisplay').textContent = status.text;
            }
        }

        // -------------------------------------------------------
        // TIME STATUS
        // -------------------------------------------------------
        function getTimeStatus(scheduledTime) {
            const now = new Date();
            const [h, m] = scheduledTime.split(':').map(Number);
            const scheduled = new Date();
            scheduled.setHours(h, m, 0, 0);
            const diffMins = Math.round((now - scheduled) / 60000);

            if (diffMins === 0) return { text: '0' };
            if (diffMins > 0) return { text: `+${diffMins}'` };
            return { text: `${diffMins}'` };
        }

        // -------------------------------------------------------
        // WAKE LOCK
        // -------------------------------------------------------
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); }
                catch (err) { console.log('Wake lock failed:', err); }
            }
        }

        // -------------------------------------------------------
        // GPS TRACKING
        // -------------------------------------------------------
        function startTracking() {
            if (!navigator.geolocation) return;
            requestWakeLock();

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;

                    // Record track point
                    const timeStr = new Date().toTimeString().slice(0, 8);
                    if (!tripStartTime) tripStartTime = timeStr;

                    if (tripTrack.length > 0) {
                        const prev = tripTrack[tripTrack.length - 1];
                        totalDistance += getDistance([prev.lat, prev.lng], [latitude, longitude]);
                    }
                    tripTrack.push({ lat: latitude, lng: longitude, t: timeStr });

                    checkStop([latitude, longitude]);
                    pushToFirebase(latitude, longitude);
                    renderStops();
                },
                (error) => {
                    console.error(error.message);
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                    setTimeout(() => { if (routeStops.length > 0) startTracking(); }, 3000);
                },
                { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
            );

            timerInterval = setInterval(() => renderStops(), 5000);

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    requestWakeLock();
                    if (watchId === null && routeStops.length > 0) startTracking();
                }
            });
        }

        // -------------------------------------------------------
        // FIREBASE PUSH (live location)
        // -------------------------------------------------------
        function pushToFirebase(lat, lng) {
            if (currentStopIndex >= routeStops.length) return;
            const nextStop = routeStops[currentStopIndex];
            const scheduledTime = getStopScheduledTime(nextStop);
            const status = getTimeStatus(scheduledTime);

            set(busRef, {
                active: true,
                lat, lng,
                route: currentRouteName,
                nextStop: nextStop.properties.name,
                scheduledTime,
                status: status.text
            });
        }

        // -------------------------------------------------------
        // SAVE TRIP TO HISTORY
        // -------------------------------------------------------
        function saveTrip() {
            if (tripTrack.length < 2) return; // nothing meaningful to save
            const endTime = new Date().toTimeString().slice(0, 8);
            const tripKey = `${tripDate}_${currentRouteId}_${departureTime.replace(':', '')}`;
            const tripsRef = ref(db, `trips/${tripKey}`);
            set(tripsRef, {
                routeName: currentRouteName,
                routeId: currentRouteId,
                date: tripDate,
                departureTime,
                startTime: tripStartTime,
                endTime,
                distanceKm: (totalDistance / 1000).toFixed(2),
                track: tripTrack
            });
        }

        // -------------------------------------------------------
        // STOP DETECTION
        // -------------------------------------------------------
        function checkStop(latlng) {
            if (currentStopIndex >= routeStops.length) return;

            for (let i = currentStopIndex; i < routeStops.length; i++) {
                const stop = routeStops[i];
                const stopLatLng = [stop.geometry.coordinates[1], stop.geometry.coordinates[0]];
                if (getDistance(latlng, stopLatLng) <= 30) {
                    currentStopIndex = i + 1;
                    if (currentStopIndex >= routeStops.length) endRoute(true);
                    return;
                }
            }
        }

        function getDistance([lat1, lng1], [lat2, lng2]) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // -------------------------------------------------------
        // END ROUTE
        // -------------------------------------------------------
        function stopAllTracking() {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            if (timerInterval !== null) { clearInterval(timerInterval); timerInterval = null; }
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
        }

        window.endRoute = function (auto = false) {
            if (timerInterval !== null) { clearInterval(timerInterval); timerInterval = null; }

            // Auto end with next route — save trip, then switch
            if (auto && nextRouteFile) {
                saveTrip();
                const file = nextRouteFile;
                const name = nextRouteName;
                const id = nextRouteId;
                const time = nextDepartureTime;
                nextRouteFile = null; nextRouteName = null; nextRouteId = null; nextDepartureTime = null;
                if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }

                currentRouteName = name;
                currentRouteId = id;
                departureTime = time;
                tripTrack = [];
                totalDistance = 0;
                tripStartTime = null;
                tripDate = new Date().toISOString().slice(0, 10);

                fetch(file)
                    .then(res => res.json())
                    .then(data => {
                        routeStops = data.features
                            .filter(f => f.geometry.type === 'Point')
                            .sort((a, b) => a.id - b.id);
                        currentStopIndex = 0;
                        document.querySelector('.leftPanel').style.display = 'flex';
                        renderStops();
                        startTracking();
                    });
                return;
            }

            // Auto end with no next route — save trip, show idle
            if (auto && !nextRouteFile) {
                saveTrip();
                stopAllTracking();
                set(busRef, { active: false });
                routeStops = [];
                currentStopIndex = 0;
                document.querySelector('.leftPanel').style.display = 'none';
                document.getElementById('stopList').innerHTML = '';
                return;
            }

            // Manual end — save trip, return to route list
            saveTrip();
            stopAllTracking();
            set(busRef, { active: false });
            routeStops = [];
            currentStopIndex = 0;
            nextRouteFile = null; nextRouteName = null; nextRouteId = null; nextDepartureTime = null;
            document.querySelector('.leftPanel').style.display = 'flex';
            document.getElementById('driverScreen').style.display = 'none';
            showRouteList();
        }

        window.toggleFullscreen = function () {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        window.addEventListener("beforeunload", () => set(busRef, { active: false }));
        window.addEventListener('DOMContentLoaded', () => showRouteList());
    </script>
</head>

<body>

    <!-- SCREEN 1: Route list -->
    <div id="screen1" class="driverRouteScreen">
        <div class="driverHeader">
            <div class="headerDate" id="headerDate">--</div>
            <div class="headerStatus">✓ 3G &nbsp; ✓ GPS 1/1</div>
        </div>
        <div id="routeList" class="selectionList"></div>
    </div>

    <!-- SCREEN 2: Departures -->
    <div id="screen2" class="driverRouteScreen" style="display:none;">
        <div class="driverHeader">
            <button class="backBtn" onclick="showRouteList()">&#8592;</button>
            <div class="headerDate" id="screen2Title">--</div>
            <div class="headerStatus">✓ 3G &nbsp; ✓ GPS 1/1</div>
        </div>
        <div id="departureList" class="selectionList"></div>
    </div>

    <!-- DRIVER SCREEN -->
    <div id="driverScreen" class="driverDisplay" style="display:none;">
        <div class="driverHeader">
            <div class="headerDate" id="headerDate2">--</div>
            <div class="headerStatus">✓ 3G &nbsp; ✓ GPS 1/1</div>
        </div>

        <div class="driverTop">
            <div class="leftPanel">
                <div class="routeBox">
                    <div id="routeNumber">-</div>
                </div>
                <div id="latenessDisplay" class="latenessDisplay"></div>
            </div>
            <div id="stopList" class="stopList"></div>
        </div>

        <div class="driverBottom">
            <button class="endRouteBtn" onclick="endRoute()">&#9632;</button>
            <button class="fullscreenBtn" onclick="toggleFullscreen()">&#x26F6;</button>
            <div class="plateBox">BN 29 TCB</div>
        </div>
    </div>

</body>
</html>
